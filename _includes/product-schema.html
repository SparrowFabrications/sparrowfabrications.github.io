{% if page.product_schema %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ page.title }}",
  "description": "{{ page.description }}",
  "brand": {
    "@type": "Brand",
    "name": "Sparrow Fabrications"
  },
  "manufacturer": {
    "@type": "Organization",
    "name": "Sparrow Fabrications",
    "url": "https://sparrowfabrications.co.uk"
  },
  "offers": {
    "@type": "Offer",{% if page.price %}
    "price": "{{ page.price }}",
    "priceCurrency": "{{ page.price_currency | default: 'GBP' }}",{% endif %}
    "availability": "https://schema.org/InStock",
    "url": "{{ site.etsy_url }}",
    "seller": {
      "@type": "Organization",
      "name": "Sparrow Fabrications"
    }
  }{% if page.rating_count %},
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{{ page.rating_value | default: 5 }}",
    "bestRating": "5",
    "worstRating": "1",
    "ratingCount": "{{ page.rating_count }}"
  }{% endif %}
}
</script>
{% endif %}
